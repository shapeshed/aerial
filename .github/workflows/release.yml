name: GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Generate registry database using F-Droid's build environment
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/workspace" -w /workspace \
            registry.gitlab.com/fdroid/fdroidserver:buildserver-trixie \
            python3 scripts/generate-registry-db.py \
              --input app/src/main/registry/registry.json \
              --output app/build/generated/aerialRegistry/assets/registry.db.compressed \
              --schema app/schemas/com.shapeshed.aerial.data.RegistryDatabase/1.json

      - name: Decode release keystore
        env:
          AERIAL_KEYSTORE_BASE64: ${{ secrets.AERIAL_KEYSTORE_BASE64 }}
          AERIAL_KEYSTORE_PASSWORD: ${{ secrets.AERIAL_KEYSTORE_PASSWORD }}
          AERIAL_KEY_ALIAS: ${{ secrets.AERIAL_KEY_ALIAS }}
          AERIAL_KEY_PASSWORD: ${{ secrets.AERIAL_KEY_PASSWORD }}
        run: |
          if [ -z "$AERIAL_KEYSTORE_BASE64" ] ||
             [ -z "$AERIAL_KEYSTORE_PASSWORD" ] ||
             [ -z "$AERIAL_KEY_ALIAS" ] ||
             [ -z "$AERIAL_KEY_PASSWORD" ]; then
            echo "All Aerial signing secrets are required for signed releases." >&2
            exit 1
          fi
          printf '%s' "$AERIAL_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/aerial-release.jks"

      - name: Run release checks
        env:
          AERIAL_KEYSTORE_FILE: ${{ runner.temp }}/aerial-release.jks
          AERIAL_KEYSTORE_PASSWORD: ${{ secrets.AERIAL_KEYSTORE_PASSWORD }}
          AERIAL_KEY_ALIAS: ${{ secrets.AERIAL_KEY_ALIAS }}
          AERIAL_KEY_PASSWORD: ${{ secrets.AERIAL_KEY_PASSWORD }}
        run: ./gradlew test lint assembleRelease bundleRelease -x generateRegistryAsset

      - name: Prepare release assets
        run: |
          set -eu
          tag="${GITHUB_REF_NAME:-manual}"
          signed_apk="app/build/outputs/apk/release/app-release.apk"
          signed_aab="app/build/outputs/bundle/release/app-release.aab"
          if [ ! -f "$signed_apk" ]; then
            echo "Expected signed APK at $signed_apk" >&2
            exit 1
          fi
          if [ ! -f "$signed_aab" ]; then
            echo "Expected signed AAB at $signed_aab" >&2
            exit 1
          fi
          mkdir -p app/build/release-assets app/build/play-assets
          cp "$signed_apk" "app/build/release-assets/aerial-${tag}.apk"
          cp "$signed_aab" "app/build/play-assets/aerial-${tag}.aab"
          sha256sum "app/build/release-assets/aerial-${tag}.apk" > "app/build/release-assets/aerial-${tag}.apk.sha256"
          sha256sum "app/build/play-assets/aerial-${tag}.aab" > "app/build/play-assets/aerial-${tag}.aab.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aerial-release-apk
          path: app/build/release-assets/*
          if-no-files-found: error

      - name: Upload Play artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aerial-play-aab
          path: app/build/play-assets/*
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/release-assets/*
            app/build/play-assets/*
          overwrite_files: true
          draft: true
          generate_release_notes: true
