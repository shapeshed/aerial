name: Bug report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please do not use this
        form for security vulnerabilities — see [SECURITY.md](https://github.com/shapeshed/aerial/blob/main/.github/SECURITY.md)
        instead.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Aerial
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Aerial version
      description: Settings screen shows the current version.
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version and device
      placeholder: "e.g. Android 14, Pixel 7"
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, logs, or anything else relevant.
    validations:
      required: false
